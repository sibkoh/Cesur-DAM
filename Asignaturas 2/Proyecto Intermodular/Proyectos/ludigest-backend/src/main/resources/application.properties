spring.application.name=ludigest-backend
# Configuracion del puerto del servidor web
server.port=8080

# Credenciales y conexion a la base de datos local
spring.datasource.url=jdbc:mysql://localhost:3306/ludigest_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuracion de Hibernate / JPA
# "update" asegura que las tablas se creen o modifiquen solas sin borrar los datos existentes
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Usamos el dialecto de MySQL adecuado
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
